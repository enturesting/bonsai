# DigitalOcean App Platform spec for the Bonsai eval harness.
# Deploy with:  doctl apps create --spec deploy/app.yaml
# Secrets are set AFTER create (see deploy/DEPLOY.md) — never commit real values.
name: bonsai
region: nyc
services:
  - name: web
    # Build from the Dockerfile in this repo (deploy/Dockerfile).
    dockerfile_path: deploy/Dockerfile
    source_dir: /
    github:
      repo: enturesting/bonsai
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    run_command: uvicorn main:app --host 0.0.0.0 --port 8080 --timeout-keep-alive 75
    health_check:
      http_path: /healthz
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      # MOCK-FIRST DEPLOY: the whole demo (red→green flip + Atlas lineage money-shot)
      # runs OFFLINE with these two flags — NO secrets, nothing external to fail on
      # stage, and /healthz boots clean. This is the bulletproof public URL for $600.
      - key: WEB_MOCK_STREAM
        scope: RUN_TIME
        type: GENERAL
        value: "1"
      - key: MOCK_AUT
        scope: RUN_TIME
        type: GENERAL
        value: "1"
      # --- TO GO LIVE later (optional): drop WEB_MOCK_STREAM, set MOCK_AUT=0, and add
      #     as SECRET via the DO UI: MONGODB_URI, VOYAGE_API_KEY (Atlas + Voyage live).
      #     Gemini-on-Vertex needs a service-account JSON (GOOGLE_APPLICATION_CREDENTIALS)
      #     + GOOGLE_CLOUD_PROJECT/GOOGLE_CLOUD_LOCATION — see api-key-setup-guide.md §Vertex.
      #     (ADC from `gcloud` does NOT exist on the DO box — W12 risk #5.)
