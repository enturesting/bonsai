<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bonsai — eval harness</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>🌳 Bonsai <span class="subtitle">self-improving eval <strong>harness</strong></span></h1>
    <form hx-post="/run" hx-target="#claims" hx-swap="innerHTML" hx-indicator="#run-spin">
      <button type="submit" class="btn btn--run">Run AUT over fixtures</button>
      <span id="run-spin" class="htmx-indicator">running…</span>
    </form>
  </header>

  <main class="grid">
    <section class="panel claims-panel">
      <h2>Claims <span class="hint">each a single assertion the AUT made</span></h2>
      <div id="claims">
        {% include "_claims.html" %}
      </div>
    </section>

    <aside class="side">
      {% include "_score.html" %}
      {% include "_tree.html" %}
    </aside>
  </main>

  <script src="/static/main.js"></script>
</body>
</html>
